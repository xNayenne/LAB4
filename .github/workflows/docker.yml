name: Docker CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Budowanie obrazu Docker
        run: docker build -t lab4-docker .

      - name: Uruchomienie kontenera
        run: docker run -d -p 8080:80 lab4-docker

      - name: Sprawdzenie działania
        run: curl http://localhost:8080